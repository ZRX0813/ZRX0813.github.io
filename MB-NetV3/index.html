<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MB-NetV3 · Inventory Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <link rel="stylesheet" href="css/map.css" />
</head>
<body>
  <header class="toolbar">
    <h1 class="title" title="MB-NetV3: Regional-Scale Inventory Mapping of Creeping Landslides from Wrapped Interferograms">
      MB-NetV3: Regional-Scale Inventory Mapping of Creeping Landslides from Wrapped Interferograms
    </h1>
  </header>

  <aside class="layer-panel hidden" id="layer-panel" aria-label="Overlay layers">
    <div class="layer-panel-inner" id="overlay-toggles"></div>
  </aside>

  <div class="map-wrap" id="map-wrap">
    <main id="map" aria-hidden="false"></main>
    <div class="search-float" id="search-float" role="search">
      <div class="search-float-handle" id="search-drag-handle" title="Drag to move">
        <span class="search-float-grip" aria-hidden="true"></span>
        <span class="search-float-title">Place search</span>
      </div>
      <div class="search-float-body">
        <div class="search-row">
          <input type="search" id="search-input" class="search-input" placeholder="e.g. Rome, Milan, Tuscany" autocomplete="off" enterkeyhint="search" />
          <button type="button" class="btn" id="search-btn">Search</button>
        </div>
        <div class="search-results hidden" id="search-results" role="listbox" aria-label="Search results"></div>
      </div>
    </div>

    <aside class="detail-panel hidden" id="detail-panel" role="complementary" aria-label="Feature attributes">
      <div class="detail-panel-head">
        <div class="detail-panel-handle" id="detail-drag-handle" title="Drag to move">
          <span class="detail-grip" aria-hidden="true"></span>
          <span class="detail-panel-title" id="detail-panel-title">Feature</span>
        </div>
        <button type="button" class="detail-close" id="detail-close" aria-label="Close panel">×</button>
      </div>
      <div class="detail-panel-body">
        <dl class="detail-attrs" id="detail-attrs"></dl>
      </div>
    </aside>
  </div>

  <footer class="site-foot" id="site-foot">
    <div class="foot-accent" aria-hidden="true"></div>
    <div class="foot-inner">
      <nav class="foot-rail" aria-label="Map services">
        <a class="foot-link" href="/">Home</a>
        <span class="foot-divider" aria-hidden="true"></span>
        <span class="foot-chip">Basemap</span>
        <a class="foot-link" href="https://www.openstreetmap.org/copyright" rel="noopener noreferrer">OpenStreetMap</a>
        <span class="foot-divider" aria-hidden="true"></span>
        <span class="foot-chip">Search</span>
        <a class="foot-link" href="https://nominatim.org" rel="noopener noreferrer">Nominatim</a>
        <span class="foot-divider" aria-hidden="true"></span>
        <span class="foot-chip">GMBA</span>
        <a class="foot-link" href="https://www.gmba.unibe.ch/" rel="noopener noreferrer">gmba.unibe.ch</a>
        <span class="foot-divider" aria-hidden="true"></span>
        <span class="foot-chip">IFFI</span>
        <a class="foot-link" href="https://www.progettoiffi.isprambiente.it/" rel="noopener noreferrer">progettoiffi.isprambiente.it</a>
      </nav>
      <p class="foot-author">
        <span class="foot-author-name">Ruixuan Zhang</span>
        <span class="foot-divider" aria-hidden="true"></span>
        <a class="foot-link" href="https://orcid.org/0009-0009-0099-7879" rel="noopener noreferrer" title="ORCID iD">ORCID</a>
      </p>
    </div>
  </footer>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="js/map.js" type="module"></script>
</body>
</html>
