<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MB-NetV3 · Inventory Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <link rel="stylesheet" href="css/map.css" />
</head>
<body>
  <header class="toolbar">
    <h1 class="title" title="MB-NetV3: Regional-Scale Inventory Mapping of Creeping Landslides from Wrapped Interferograms">
      MB-NetV3: Regional-Scale Inventory Mapping of Creeping Landslides from Wrapped Interferograms
    </h1>
    <div class="search" id="search">
      <input type="search" id="search-input" class="search-input" placeholder="搜索地名（如 Rome, 米兰）" autocomplete="off" enterkeyhint="search" />
      <button type="button" class="btn" id="search-btn">搜索</button>
      <div class="search-results hidden" id="search-results" role="listbox" aria-label="搜索结果"></div>
    </div>
  </header>

  <aside class="layer-panel hidden" id="layer-panel" aria-label="叠加图层">
    <div class="layer-panel-inner" id="overlay-toggles"></div>
  </aside>

  <main id="map"></main>

  <p class="attrib">
    <a href="/">主页</a>
    · 底图 © <a href="https://www.openstreetmap.org/copyright" rel="noopener noreferrer">OpenStreetMap</a>
    · 地名 © <a href="https://nominatim.org" rel="noopener noreferrer">Nominatim</a>
  </p>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="js/map.js" type="module"></script>
</body>
</html>
